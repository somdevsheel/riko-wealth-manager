services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: riko
      POSTGRES_PASSWORD: riko
      POSTGRES_DB: riko
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riko -d riko"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://riko:riko@postgres:5432/riko
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB: riko
      LLM_ENABLED: ${LLM_ENABLED:-0}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:7b-instruct}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      CHROMA_DIR: /data/chroma_store
    volumes:
      - chroma_data:/data/chroma_store
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
  chroma_data:
